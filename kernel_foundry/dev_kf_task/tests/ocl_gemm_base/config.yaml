task_name: gemm_ocl_base # name for operation
job_name: test_gemm_ocl_base # A name for the job, e.g., experiment name or model name

gpu_arch: bmg # Short name of the target architecture
language: OCL # The target language


inference:
  servers:
  - _target_: kernelgen.inference_server.InferenceServer
    server_type: intel_gnai
    model_name: claude-4-6-sonnet
    temperature: 0.0
    max_tokens: 5000

prompt:
  reference_language: OCL

test_reference: true # If true will run the tests and profiling for the reference too

# evolve mode
evolve_mode: false
# use_queue: false

# store_generated_kernels_in_db: false
# paths:
#     kernels_db_readonly_path: null
#     kernels_db_insertonly_path: null

# eval_config:
#     profile_custom_model: false
#     profile_original_model: false

max_iters: 3
branches_per_iteration: 2